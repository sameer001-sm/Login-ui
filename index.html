<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ApexPlanet Task 2</title>
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar - Bootstrap Component -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#"><i class="fa fa-code"></i> ApexPlanet</a>
    </div>
  </nav>

  <!-- Login Card - Center me -->
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row w-100">
      <div class="col-12 col-md-6 col-lg-4 mx-auto">
        <div class="card shadow-lg p-4 animate-card">
          <h3 class="text-center mb-4 text-primary fw-bold">Login</h3>
          
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" id="loginEmail" class="form-control" placeholder="Enter email" required>
              <small class="text-danger" id="emailError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePass">
                  <i class="fa fa-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
            <p class="text-center mt-3">New user? <a href="register.html">Register here</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- JS Files -->
  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
